          title: Björn N. Persson, PhD
          subtitle: "I'm a postdoctoral researcher at Karolinska Institutet, Sweden. My work is in psychology, focusing on individual differences and sex differences in cognition, personality and interests. My <a href='https://www.utupub.fi/bitstream/handle/10024/148451/AnnalesB496Persson.pdf?sequence=1'>dissertation</a> was about the \"Dark Triad\", which phrased less sensationally, refers to three variants of antagonistic personality traits (Machiavellianism, narcissism and psychopathy). While I have mostly put the Dark Triad behind me, I'm still interested in psychopathology, especially the distinction between normal and abnormal personality traits. Indeed, beyond the particulars of my postdoc, I'm working on a translation of the MMPI-3; and also on an international collaboration on personality functioning (i.e., DSM/ICD Criterion A).<br><br>This page functions as both a portfolio of sorts and a place where I can upload various things I'd like to save or may want to share. Like many others, I've been inspired by Kristoffer Magnusson's (<a href='https://www.rpsychologist.com'>www.rpsychologist.com</a>) many excellent visualizations. These days, AI makes it possible to create similar interactive visualizations without being a strong programmer, which is something I've exploited here. I've tried checking visualizations using various means, but they should be viewed mostly as pedagogical tools and you should be aware that they may not be completely accurate. If you find any mistakes, please contact me."
          imageUrl: "picture.jpeg"
          imageWidth: 160
          imageHeight: 160
